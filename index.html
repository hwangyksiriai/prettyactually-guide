<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretty Actually — 가이드라인 허브</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@300;400&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #3A6B4E;
      --green-light: #5A8C6B;
      --green-pale: #8FB89F;
      --cream: #FAF8F4;
      --warm-white: #F5F3EF;
      --text-dark: #1E2D26;
      --text-mid: #4A6355;
      --text-light: #7A9B8A;
      --border: #D4E4D9;
      --tag-bg: #E8F2EB;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--cream);
      color: var(--text-dark);
      line-height: 1.7;
      min-height: 100vh;
    }

    .hub-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 60px 28px 80px;
    }

    /* HEADER */
    .hub-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .hub-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      font-weight: 300;
      color: var(--green-light);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .hub-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 700;
      color: var(--green);
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .hub-sub {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    .hub-desc {
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.7;
    }

    .hub-divider {
      width: 40px;
      height: 1px;
      background: var(--green-pale);
      margin: 28px auto 0;
    }

    /* LINK CARDS */
    .link-list {
      display: grid;
      gap: 16px;
    }
    .link-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 24px;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .link-card:active { background: var(--tag-bg); transform: scale(0.99); }
    .link-card-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--green-pale);
      line-height: 1;
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }
    .link-card-body { flex: 1; }
    .link-card-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .link-card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.4;
      margin-bottom: 5px;
    }
    .link-card-desc {
      font-size: 12.5px;
      color: var(--text-mid);
      line-height: 1.6;
    }
    .link-card-arrow {
      font-size: 18px;
      color: var(--green-light);
      flex-shrink: 0;
    }

    /* FOOTER */
    .hub-footer {
      text-align: center;
      margin-top: 56px;
      font-size: 11.5px;
      color: var(--text-light);
      letter-spacing: 0.05em;
      line-height: 1.8;
    }
    .hub-footer strong { color: var(--text-mid); }

    @media (max-width: 480px) {
      .hub-wrap { padding: 44px 18px 60px; }
      .hub-title { font-size: 27px; }
      .link-card { padding: 20px 18px; gap: 14px; }
      .link-card-num { font-size: 26px; width: 30px; }
      .link-card-title { font-size: 15.5px; }
    }
  </style>
</head>
<body>

<div class="hub-wrap">
  <div class="hub-header">
    <div class="hub-eyebrow">Influencer Guideline</div>
    <div class="hub-title">프리티액츄얼리<br>가이드라인 허브</div>
    <div class="hub-sub">Pretty Actually × Creator Campaign</div>
    <div class="hub-desc">아래에서 해당하는 가이드라인을 선택해 주세요.</div>
    <div class="hub-divider"></div>
  </div>

  <div class="link-list">
    <a href="guide1.html" class="link-card">
      <div class="link-card-num">01</div>
      <div class="link-card-body">
        <div class="link-card-label">Guideline 1</div>
        <div class="link-card-title">캠페인 가이드라인 A</div>
        <div class="link-card-desc">프리티액츄얼리 리밸런싱 폼 클렌저 캠페인 안내</div>
      </div>
      <div class="link-card-arrow">→</div>
    </a>

    <a href="guide2.html" class="link-card">
      <div class="link-card-num">02</div>
      <div class="link-card-body">
        <div class="link-card-label">Guideline 2</div>
        <div class="link-card-title">캠페인 가이드라인 B</div>
        <div class="link-card-desc">다른 목적의 캠페인 안내</div>
      </div>
      <div class="link-card-arrow">→</div>
    </a>
  </div>

  <div class="hub-footer">
    <strong>Pretty Actually (프리티액츄얼리)</strong><br>
    본 가이드라인은 선별된 크리에이터에게만 제공되는 자료입니다.
  </div>
</div>

</body>
</html>
